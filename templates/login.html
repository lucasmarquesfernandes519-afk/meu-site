<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - LMF Climatização</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #0f172a, #1e293b); height: 100vh;">

    <div class="d-flex justify-content-center align-items-center h-100">
        <div class="card shadow-lg p-4" style="width: 350px; border-radius: 15px;">

            <h2 class="text-center mb-2">LMF Climatização</h2>
            <p class="text-center text-muted">Acesso ao sistema</p>

            <form method="POST" action="/login">

                <div class="mb-3">
                    <input type="email" name="email" class="form-control" placeholder="Seu email" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="senha" class="form-control" placeholder="Sua senha" required>
                </div>

                <button class="btn btn-primary w-100 fw-bold">Entrar</button>
            </form>

            <div class="text-center mt-3">
                <a href="/register">Criar conta</a>
            </div>

        </div>
    </div>

</body>
</html>
